<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLUE HOUR</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f7fb;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.title {
  text-align: center;
  font-size: 32px;
  color: #7a8cff;
  margin-bottom: 20px;
}

/* 카드 */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

/* 모달 */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  max-width: 500px;
  margin: 10% auto;
  padding: 20px;
  border-radius: 12px;
}

.close {
  float: right;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="title">BLUE HOUR</div>

<div class="grid">

  <div class="card" onclick="openModal('rule1')">
    완캐입 지향 / 반캐입
  </div>

  <div class="card" onclick="openModal('rule2')">
    선정성 캐싱
  </div>

  <div class="card" onclick="openModal('rule3')">
    타장르 금지
  </div>

</div>

</div>

<!-- 모달들 -->

<div id="rule1" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('rule1')">X</span>
    <h3>완캐입 지향 / 반캐입</h3>
    <p>완캐입을 기본으로 하되 반캐입도 허용됩니다.</p>
  </div>
</div>

<div id="rule2" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('rule2')">X</span>
    <h3>선정성 캐싱</h3>
    <p>선정성 캐싱은 금지입니다.</p>
  </div>
</div>

<div id="rule3" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('rule3')">X</span>
    <h3>타장르 금지</h3>
    <p>타장르 직접 언급은 금지입니다.</p>
  </div>
</div>

<script>
function openModal(id) {
  document.getElementById(id).style.display = "block";
}

function closeModal(id) {
  document.getElementById(id).style.display = "none";
}

window.onclick = function(e) {
  if (e.target.classList.contains('modal')) {
    e.target.style.display = "none";
  }
}
</script>

</body>
</html>
